# Backend API image. Use in Cloud Run: Build configuration = "Build configuration file", path = cloudbuild-api.yaml
# timeout: torch + segment-anything pip install can take 15–25 min
timeout: '2400s'
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'AgenticAI_Backend/NautiCAI AI/NautiCAI_Backend/Dockerfile'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nauticai-api:$COMMIT_SHA'
      - 'AgenticAI_Backend/NautiCAI AI/NautiCAI_Backend'
images:
  - 'gcr.io/$PROJECT_ID/nauticai-api:$COMMIT_SHA'
